<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作問システム 管理者画面</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #0F6E56;
    --green-bright: #1D9E75;
    --orange: #EF9F27;
    --red: #DC2626;
    --gray-bg: #F4F6F5;
    --gray-border: #D0D5D3;
    --radius: 10px;
  }

  body {
    font-family: system-ui, "Hiragino Kaku Gothic ProN", sans-serif;
    background: var(--gray-bg);
    min-height: 100vh;
    color: #222;
  }

  /* ===== 画面切替 ===== */
  .view { display: none; }
  .view.active { display: block; }

  /* ===== ボタン ===== */
  .btn {
    border: none;
    border-radius: 8px;
    padding: 9px 22px;
    font-size: .88rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s, background .15s;
  }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:not(:disabled):hover { background: var(--green-bright); }
  .btn-danger { background: #FEE2E2; color: var(--red); border: 1px solid #FECACA; }
  .btn-danger:not(:disabled):hover { background: #FECACA; }
  .btn-ghost { background: #fff; color: #555; border: 1px solid var(--gray-border); }
  .btn-ghost:not(:disabled):hover { background: #F3F4F6; }
  .btn-sm { padding: 5px 12px; font-size: .78rem; }

  /* ===== レイアウト ===== */
  .page-header {
    background: var(--green);
    color: #fff;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .page-header h1 { font-size: 1rem; font-weight: 700; }
  .page-header .right { display: flex; align-items: center; gap: 12px; }
  .page-header .right span { font-size: .82rem; opacity: .8; }

  .page-body {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  .breadcrumb {
    font-size: .82rem;
    color: #888;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .breadcrumb a {
    color: var(--green);
    cursor: pointer;
    text-decoration: none;
  }
  .breadcrumb a:hover { text-decoration: underline; }

  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: #333;
    margin-bottom: 14px;
  }

  /* ===== カード ===== */
  .card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
    overflow: hidden;
  }

  /* ===== テーブル ===== */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .88rem;
  }

  th {
    background: #F8FAF9;
    color: #666;
    font-size: .78rem;
    font-weight: 600;
    letter-spacing: .05em;
    padding: 10px 16px;
    text-align: left;
    border-bottom: 1px solid var(--gray-border);
  }

  td {
    padding: 11px 16px;
    border-bottom: 1px solid #F0F0F0;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tr.clickable { cursor: pointer; transition: background .12s; }
  tr.clickable:hover td { background: #F0FDF8; }

  /* ===== バッジ ===== */
  .badge {
    display: inline-block;
    border-radius: 20px;
    padding: 2px 10px;
    font-size: .75rem;
    font-weight: 700;
  }

  .badge-green { background: #DCFCE7; color: #166534; }
  .badge-orange { background: #FEF3C7; color: #92400E; }
  .badge-gray { background: #F3F4F6; color: #6B7280; }
  .badge-blue { background: #DBEAFE; color: #1e3a5f; }

  /* ===== チャットログ ===== */
  .log-row td { vertical-align: top; }

  .msg-user {
    background: #DBEAFE;
    border-radius: 10px;
    padding: 7px 11px;
    font-size: .85rem;
    color: #1e3a5f;
    margin-bottom: 4px;
  }

  .msg-ai {
    border-radius: 10px;
    padding: 7px 11px;
    font-size: .85rem;
    color: #333;
    background: #F3F4F6;
    border-left: 3px solid var(--gray-border);
  }

  .msg-ai.new-structure { background: #ECFDF5; border-left-color: var(--green-bright); color: #064E3B; }
  .msg-ai.hint { background: #FFFBEB; border-left-color: var(--orange); color: #7C4700; }
  .msg-ai.clear { background: #ECFDF5; border-left-color: var(--green); font-weight: 700; }

  /* ===== アクションバー ===== */
  .action-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  /* ===== 空状態 ===== */
  .empty {
    text-align: center;
    color: #aaa;
    padding: 48px 0;
    font-size: .9rem;
  }

  /* ===== セッションアコーディオン ===== */
  .session-block { margin-bottom: 16px; }

  .session-head {
    background: #fff;
    border: 1px solid var(--gray-border);
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: background .12s;
  }
  .session-head:hover { background: #F8FAF9; }

  .session-head-left { display: flex; align-items: center; gap: 12px; }
  .session-head .s-date { font-size: .82rem; color: #555; }
  .session-head .s-stat { font-weight: 700; color: var(--green); font-size: .9rem; }
  .session-head-right { display: flex; align-items: center; gap: 8px; }

  .session-body {
    display: none;
    border: 1px solid var(--gray-border);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    background: #fff;
  }
  .session-body.open { display: block; }

  .spinner {
    text-align: center;
    padding: 24px;
    color: #aaa;
    font-size: .85rem;
  }
</style>
</head>
<body>

<!-- メイン画面 -->
<div id="screen-main">
  <div class="page-header">
    <h1>作問システム 管理者画面</h1>
  </div>

  <div class="page-body">
    <!-- パンくず -->
    <div class="breadcrumb" id="breadcrumb"></div>

    <!-- 児童一覧 -->
    <div id="view-students">
      <div class="action-bar">
        <div class="section-title">児童一覧</div>
        <button class="btn btn-ghost btn-sm" id="btn-export-csv">CSVダウンロード</button>
      </div>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>学籍番号</th>
              <th>最終ログイン</th>
              <th>達成構造数</th>
            </tr>
          </thead>
          <tbody id="students-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 児童詳細 -->
    <div id="view-student-detail" style="display:none">
      <div class="section-title" id="detail-title"></div>
      <div id="sessions-container"></div>
    </div>
  </div>
</div>

<script>
  let currentUserId = null;

  // ===== API helper =====
  async function api(path, options = {}) {
    const res = await fetch(path, {
      ...options,
      headers: { "Content-Type": "application/json", ...(options.headers || {}) },
    });
    if (!res.ok) throw new Error(await res.text());
    if (options.method === "DELETE") return {};
    return res.json();
  }

  function showView(id) {
    ["view-students", "view-student-detail"].forEach(v => {
      document.getElementById(v).style.display = "none";
    });
    document.getElementById(id).style.display = "block";
  }

  // ===== 児童一覧 =====
  async function loadStudents() {
    showView("view-students");
    setBreadcrumb([{ label: "児童一覧" }]);
    const tbody = document.getElementById("students-tbody");
    tbody.innerHTML = `<tr><td colspan="3" class="empty">読み込み中…</td></tr>`;
    try {
      const students = await api("/admin/api/students");
      if (students.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" class="empty">データがありません</td></tr>`;
        return;
      }
      tbody.innerHTML = "";
      students.forEach(s => {
        const tr = document.createElement("tr");
        tr.className = "clickable";
        tr.innerHTML = `
          <td><strong>${s.user_id}</strong></td>
          <td>${fmtDate(s.last_login)}</td>
          <td>${structureBadges(s.structure_count)}</td>
        `;
        tr.addEventListener("click", () => loadStudentDetail(s.user_id));
        tbody.appendChild(tr);
      });
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="3" class="empty">読み込みエラー</td></tr>`;
    }
  }

  function structureBadges(count) {
    const cls = count === 3 ? "badge-green" : count > 0 ? "badge-orange" : "badge-gray";
    return `<span class="badge ${cls}">${count} / 3</span>`;
  }

  // ===== 児童詳細 =====
  async function loadStudentDetail(userId) {
    currentUserId = userId;
    showView("view-student-detail");
    setBreadcrumb([
      { label: "児童一覧", action: loadStudents },
      { label: `${userId} さん` },
    ]);
    document.getElementById("detail-title").textContent = `${userId} さんのセッション一覧`;
    const container = document.getElementById("sessions-container");
    container.innerHTML = `<div class="spinner">読み込み中…</div>`;

    try {
      const data = await api(`/admin/api/students/${userId}`);
      container.innerHTML = "";
      if (data.sessions.length === 0) {
        container.innerHTML = `<div class="empty">セッションがありません</div>`;
        return;
      }
      data.sessions.forEach(s => {
        container.appendChild(buildSessionBlock(s, userId));
      });
    } catch (e) {
      container.innerHTML = `<div class="empty">読み込みエラー</div>`;
    }
  }

  function buildSessionBlock(session, userId) {
    const block = document.createElement("div");
    block.className = "session-block";
    block.dataset.sessionId = session.session_id;

    const structs = session.structures.map(x => STRUCT_LABEL[x] || x).join("・") || "なし";
    const head = document.createElement("div");
    head.className = "session-head";
    head.innerHTML = `
      <div class="session-head-left">
        <div>
          <div class="s-date">${fmtDate(session.created_at)}</div>
          <div class="s-stat">作問 ${session.new_count} 件（計 ${session.total_count} 回）　${structs}</div>
        </div>
      </div>
      <div class="session-head-right">
        <button class="btn btn-danger btn-sm btn-del-session" data-id="${session.session_id}">削除</button>
        <span class="toggle-arrow">▼</span>
      </div>
    `;

    const body = document.createElement("div");
    body.className = "session-body";
    body.dataset.loaded = "false";

    head.querySelector(".btn-del-session").addEventListener("click", async (e) => {
      e.stopPropagation();
      if (!confirm(`セッション #${session.session_id} を削除しますか？`)) return;
      await api(`/admin/api/sessions/${session.session_id}`, { method: "DELETE" });
      block.remove();
    });

    head.addEventListener("click", async () => {
      const isOpen = body.classList.toggle("open");
      head.querySelector(".toggle-arrow").textContent = isOpen ? "▲" : "▼";
      if (isOpen && body.dataset.loaded === "false") {
        body.dataset.loaded = "true";
        body.innerHTML = `<div class="spinner">チャット履歴を読み込み中…</div>`;
        try {
          const logs = await api(`/admin/api/sessions/${session.session_id}`);
          body.innerHTML = "";
          if (logs.length === 0) {
            body.innerHTML = `<div class="empty">チャット履歴がありません</div>`;
            return;
          }
          const tbl = buildLogsTable(logs, body);
          body.appendChild(tbl);
        } catch (e) {
          body.innerHTML = `<div class="empty">読み込みエラー</div>`;
        }
      }
    });

    block.appendChild(head);
    block.appendChild(body);
    return block;
  }

  function buildLogsTable(logs, bodyEl) {
    const tbl = document.createElement("table");
    tbl.innerHTML = `
      <thead>
        <tr>
          <th style="width:130px">日時</th>
          <th>入力 / AIの返答</th>
          <th style="width:90px">構造</th>
          <th style="width:60px">新規</th>
          <th style="width:60px"></th>
        </tr>
      </thead>
    `;
    const tbody = document.createElement("tbody");
    logs.forEach(log => {
      const tr = buildLogRow(log, tbody);
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    return tbl;
  }

  function buildLogRow(log, tbody) {
    const tr = document.createElement("tr");
    tr.className = "log-row";
    tr.dataset.logId = log.id;

    const aiCls = {
      new_structure: "new-structure",
      hint1: "hint", hint2: "hint", hint3: "hint",
      clear: "clear",
    }[log.display_type] || "";

    tr.innerHTML = `
      <td style="font-size:.78rem;color:#888;white-space:nowrap">${fmtDate(log.created_at)}</td>
      <td>
        <div class="msg-user">${esc(log.message)}</div>
        <div class="msg-ai ${aiCls}">${esc(log.ai_message)}</div>
      </td>
      <td>${log.structure
        ? `<span class="badge badge-blue">${STRUCT_LABEL[log.structure] || log.structure}</span>`
        : '<span style="color:#ccc">—</span>'}</td>
      <td>${log.is_new
        ? '<span class="badge badge-green">新規</span>'
        : '<span style="color:#ccc">—</span>'}</td>
      <td>
        <button class="btn btn-danger btn-sm">削除</button>
      </td>
    `;

    tr.querySelector(".btn-danger").addEventListener("click", async () => {
      if (!confirm("このチャットを削除しますか？")) return;
      await api(`/admin/api/logs/${log.id}`, { method: "DELETE" });
      tr.remove();
    });

    return tr;
  }

  // ===== CSV エクスポート =====
  document.getElementById("btn-export-csv").addEventListener("click", async () => {
    const res = await fetch("/admin/api/export/csv");
    if (!res.ok) { alert("エクスポートに失敗しました"); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "sakumon_export.csv";
    a.click();
    URL.revokeObjectURL(url);
  });

  // ===== パンくず =====
  function setBreadcrumb(items) {
    const el = document.getElementById("breadcrumb");
    el.innerHTML = items.map((item, i) => {
      if (i < items.length - 1 && item.action) {
        return `<a onclick="(${item.action.toString()})()">${esc(item.label)}</a> <span>›</span>`;
      }
      return `<span>${esc(item.label)}</span>`;
    }).join(" ");
  }

  // ===== Helpers =====
  const STRUCT_LABEL = { tobun: "とうぶんじょ", hougan: "ほうがんじょ", bai: "ばい" };

  function fmtDate(str) {
    if (!str) return "—";
    const d = new Date(str.endsWith("Z") ? str : str + "Z");
    return d.toLocaleDateString("ja-JP", {
      month: "numeric", day: "numeric",
      hour: "2-digit", minute: "2-digit",
    });
  }

  function esc(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ===== Boot =====
  loadStudents();
</script>
</body>
</html>
