<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作問システム 管理者画面</title>
<link rel="stylesheet" href="/static/admin.css">
</head>
<body>

<!-- メイン画面 -->
<div id="screen-main">
  <div class="page-header">
    <h1>作問システム 管理者画面</h1>
  </div>

  <div class="page-body">
    <div class="breadcrumb" id="breadcrumb"></div>

    <!-- 児童一覧 -->
    <div id="view-students">
      <div class="action-bar">
        <div class="section-title">児童一覧</div>
        <button class="btn btn-ghost btn-sm" id="btn-export-csv">CSVダウンロード</button>
      </div>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>学籍番号</th>
              <th>最終ログイン</th>
              <th>達成構造数</th>
            </tr>
          </thead>
          <tbody id="students-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 児童詳細 -->
    <div id="view-student-detail" style="display:none">
      <div class="section-title" id="detail-title"></div>
      <div id="sessions-container"></div>
    </div>
  </div>
</div>

<script src="/static/admin.js"></script>
</body>
</html>
